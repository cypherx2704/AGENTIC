# Redocly lint config for the OpenAPI base template (Contract 10).
# The base template is a component library extended via $ref by every service, so the
# operation-completeness rules are relaxed here and enforced per-service instead.
extends:
  - recommended
rules:
  operation-operationId: off
  operation-4xx-response: off
  operation-summary: off
  no-empty-servers: off
  info-license: off
  tag-description: off
  security-defined: off
