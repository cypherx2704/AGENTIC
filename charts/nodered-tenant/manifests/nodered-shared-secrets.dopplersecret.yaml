# Production shared Node-RED secrets — Doppler-synced (NOT a committed plain Secret).
#
# The Doppler operator syncs the three keys below from the Doppler config into a K8s Secret
# named `nodered-shared-secrets` in cypherx-tools. That Secret is consumed (envFrom) by BOTH the
# tool-flow-bridge Deployment (charts/tool-flow-bridge/values.yaml) and EVERY tenant Node-RED the
# provisioner creates (services/provisioner.py mounts it via envFrom nodered-shared-secrets).
#
# Operator prerequisites (one-time, per env):
#   - Doppler operator installed; bootstrap token Secret `doppler-token-secret` present in cypherx-tools.
#   - Doppler project `cypherx-platform`, config `tools.tool-flow-bridge` contains:
#       NODERED_ADMIN_TOKEN, NODERED_INVOKE_SECRET, NODERED_CREDENTIAL_SECRET  (long random values)
#
# This is applied by the ArgoCD `nodered-tenant-<env>` Application (gitops/envs/*/tools/nodered-tenant).
# The committed *.example.yaml is a reference only and is EXCLUDED from that Application.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: nodered-shared-secrets
  namespace: cypherx-tools
  labels:
    app.kubernetes.io/part-of: cypherx-flow-tools
spec:
  tokenSecret:
    name: doppler-token-secret
  project: cypherx-platform
  config: tools.tool-flow-bridge
  managedSecret:
    name: nodered-shared-secrets
    namespace: cypherx-tools
    type: Opaque
