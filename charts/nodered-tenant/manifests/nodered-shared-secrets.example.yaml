# EXAMPLE ONLY — do NOT commit real secret values. In production this is a Doppler-synced
# DopplerSecret, not a plain Secret. The SAME three keys are consumed (envFrom) by BOTH the
# tool-flow-bridge deployment and every tenant Node-RED the provisioner creates.
apiVersion: v1
kind: Secret
metadata:
  name: nodered-shared-secrets
  namespace: cypherx-tools
type: Opaque
stringData:
  NODERED_ADMIN_TOKEN: "REPLACE-with-a-long-random-token"
  NODERED_INVOKE_SECRET: "REPLACE-with-a-long-random-secret"
  NODERED_CREDENTIAL_SECRET: "REPLACE-with-a-long-random-secret"
---
# The bridge's own Contract-12 bootstrap secret (must match Auth's
# cypherx.service-auth.bootstrap-secrets."tool-flow-bridge").
apiVersion: v1
kind: Secret
metadata:
  name: tool-flow-bridge-secrets
  namespace: cypherx-tools
type: Opaque
stringData:
  SERVICE_BOOTSTRAP_SECRET: "REPLACE-with-the-bridge-bootstrap-secret"
