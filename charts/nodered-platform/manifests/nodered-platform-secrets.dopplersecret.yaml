# Production platform Node-RED secrets — Doppler-synced (NOT a committed plain Secret).
#
# The Doppler operator syncs the keys below from the Doppler config into a K8s Secret named
# `nodered-platform-secrets` in cypherx-tools, consumed (envFrom) by the singleton platform
# Node-RED (nodered-platform.yaml). Besides the admin/invoke/credential secrets it carries the
# PLATFORM PROVIDER KEY(s) the public web_search flow uses to call the external search provider.
#
# Operator prerequisites (one-time, per env):
#   - Doppler operator installed; bootstrap token Secret `doppler-token-secret` present in cypherx-tools.
#   - Doppler project `cypherx-platform`, config `tools.nodered-platform` contains:
#       PLATFORM_NODERED_ADMIN_TOKEN, PLATFORM_NODERED_INVOKE_SECRET, PLATFORM_NODERED_CREDENTIAL_SECRET,
#       SEARCH_PROVIDER (serpapi|brave; omit for keyless mock), SERPAPI_API_KEY, BRAVE_SEARCH_API_KEY
#       (long random values / real provider keys). The public web_search flow reads SEARCH_PROVIDER +
#       the provider key from this Secret via env.get(); with no key it returns deterministic mock results.
#
# This is applied by the ArgoCD `nodered-platform-<env>` Application (gitops/envs/*/tools/nodered-platform).
# The committed *.example.yaml is a reference only and is EXCLUDED from that Application.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: nodered-platform-secrets
  namespace: cypherx-tools
  labels:
    app.kubernetes.io/part-of: cypherx-flow-tools
    cypherx.ai/role: platform
spec:
  tokenSecret:
    name: doppler-token-secret
  project: cypherx-platform
  config: tools.nodered-platform
  managedSecret:
    name: nodered-platform-secrets
    namespace: cypherx-tools
    type: Opaque
