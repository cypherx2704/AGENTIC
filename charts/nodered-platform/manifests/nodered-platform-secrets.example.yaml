# EXAMPLE ONLY — do NOT commit real secret values. In production this is a Doppler-synced
# DopplerSecret (nodered-platform-secrets.dopplersecret.yaml), not a plain Secret.
#
# Consumed (envFrom) by the singleton platform Node-RED (nodered-platform.yaml). Holds:
#   * the platform runtime's admin / invoke / credential secrets (mirrors the tenant
#     nodered-shared-secrets, but for the platform-scoped instance);
#   * the PLATFORM PROVIDER KEY(s) — the credential the public web_search flow uses to call the
#     external search provider (SerpAPI / Brave). This is the whole point of the egress-ALLOW
#     platform runtime: it holds provider keys that tenant runtimes never see.
apiVersion: v1
kind: Secret
metadata:
  name: nodered-platform-secrets
  namespace: cypherx-tools
type: Opaque
stringData:
  PLATFORM_NODERED_ADMIN_TOKEN: "REPLACE-with-a-long-random-token"
  PLATFORM_NODERED_INVOKE_SECRET: "REPLACE-with-a-long-random-secret"
  PLATFORM_NODERED_CREDENTIAL_SECRET: "REPLACE-with-a-long-random-secret"
  # Provider selection + API keys used by the public web_search flow (assets/web_search_flow.json),
  # read at runtime via the Node-RED function node's env.get(). Provider is chosen by SEARCH_PROVIDER
  # (serpapi | brave); LEAVE SEARCH_PROVIDER UNSET (or its key blank) to run keyless DETERMINISTIC
  # MOCK results — exactly like tool-web-search's keyless fixtures. The flow also accepts BRAVE_API_KEY
  # as an alias for BRAVE_SEARCH_API_KEY.
  SEARCH_PROVIDER: "serpapi"          # serpapi | brave ; omit for keyless mock
  SERPAPI_API_KEY: "REPLACE-with-the-serpapi-key"
  BRAVE_SEARCH_API_KEY: "REPLACE-with-the-brave-key"
