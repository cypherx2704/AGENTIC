{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cypherx-service.fullname" . }}
  labels:
    {{- include "cypherx-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cypherx-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow app traffic from the ingress (Kong) namespace -> http port.
    {{- if .Values.networkPolicy.ingressNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - port: http
          protocol: TCP
    {{- end }}
    # Allow same-namespace pod-to-pod traffic (service mesh peers).
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - podSelector: {}
      ports:
        - port: http
          protocol: TCP
    {{- end }}
    # Allow the observability namespace to scrape :metrics ONLY (Component 7).
    {{- if .Values.networkPolicy.observabilityNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.observabilityNamespace }}
      ports:
        - port: metrics
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS resolution is always required.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if .Values.networkPolicy.allowAllEgress }}
    # Permissive egress (PgBouncer, Tempo, Auth, Kafka, external LLMs). Tighten
    # per-service if a stricter posture is required.
    - {}
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
