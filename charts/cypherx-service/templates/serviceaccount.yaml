{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cypherx-service.serviceAccountName" . }}
  labels:
    {{- include "cypherx-service.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.serviceAccount.roleArn }}
    # IRSA: bind this SA to an AWS IAM role (EKS Pod Identity / OIDC).
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
