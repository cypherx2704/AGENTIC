{{- if .Values.doppler.enabled }}
---
# Runtime secrets (Component 11/20). The Doppler operator syncs the configured
# Doppler config -> a K8s Secret that the Deployment envFroms. Holds the
# runtime DB password (db/<service>/runtime_password) and any service env vars.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: {{ include "cypherx-service.fullname" . }}-runtime
  labels:
    {{- include "cypherx-service.labels" . | nindent 4 }}
spec:
  tokenSecret:
    name: {{ include "cypherx-service.dopplerTokenSecretName" . }}
  project: {{ .Values.doppler.project | quote }}
  config: {{ required "doppler.runtimeConfig is required when doppler.enabled=true (e.g. shared-core.auth)" .Values.doppler.runtimeConfig | quote }}
  managedSecret:
    name: {{ include "cypherx-service.runtimeSecretName" . }}
    namespace: {{ .Release.Namespace }}
    type: Opaque
{{- if and .Values.database.enabled .Values.doppler.ddlConfig }}
---
# DDL secrets (Component 16 mitigation (a)): the *_ddl password is synced into a
# SEPARATE Secret, consumed ONLY by the migration Job — never the runtime pod.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: {{ include "cypherx-service.fullname" . }}-ddl
  labels:
    {{- include "cypherx-service.migrationLabels" . | nindent 4 }}
spec:
  tokenSecret:
    name: {{ include "cypherx-service.dopplerTokenSecretName" . }}
  project: {{ .Values.doppler.project | quote }}
  config: {{ .Values.doppler.ddlConfig | quote }}
  managedSecret:
    name: {{ include "cypherx-service.ddlSecretName" . }}
    namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
{{- end }}
