apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tool-flow-bridge-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cypherx-ai/cypherx-charts.git
    targetRevision: main
    path: charts/tool-flow-bridge
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
      parameters:
        - name: cypherx-service.image.tag
          value: "0.1.0"
  destination:
    server: https://kubernetes.default.svc
    namespace: cypherx-tools
  # PROD SAFETY GATE: no syncPolicy.automated — a human approves the sync in ArgoCD.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
