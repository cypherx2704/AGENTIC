apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodered-platform-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # The SINGLETON platform (public) Node-RED runtime hosting PUBLIC (promoted) tools. See the dev
  # app for details. Deployment + PVC + Service + egress-ALLOW NetworkPolicy + Doppler-synced
  # nodered-platform-secrets (admin/invoke/credential + platform PROVIDER KEYS).
  source:
    repoURL: https://github.com/cypherx-ai/cypherx-charts.git
    targetRevision: main
    path: charts/nodered-platform/manifests
    directory:
      recurse: false
      exclude: '*.example.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: cypherx-tools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
