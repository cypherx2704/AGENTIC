apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tool-flow-bridge-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # The cypherx-service base chart consumed by charts/tool-flow-bridge (values-only).
    repoURL: https://github.com/cypherx-ai/cypherx-charts.git
    targetRevision: main
    path: charts/tool-flow-bridge
    helm:
      valueFiles:
        - values.yaml
      parameters:
        # Immutable image tag — kept in lockstep with ./image.txt; bumped by the CI gitops bot.
        - name: cypherx-service.image.tag
          value: "0.1.0"
  destination:
    server: https://kubernetes.default.svc
    namespace: cypherx-tools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
