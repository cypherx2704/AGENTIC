# =====================================================================================================================
# LOCAL OVERRIDE — not part of upstream; layered on top of docker-compose.yml for the local Doppler-driven run.
# Apply with BOTH files, e.g. (run via Doppler so the env is injected):
#   doppler run -p cypherx-ai -c dev_local -- docker compose -f docker-compose.yml -f docker-compose.override.yml up -d ...
#
# Why this exists: the base docker-compose.yml omits VALKEY_URL on several services, so they fall back to the in-code
# default `redis://localhost:6379` (unreachable inside the container). Valkey is load-bearing for fail-CLOSED
# behaviour and SLOs:
#   * llms-gateway     — idempotency, rate-limit, token-revocation mirror (soft, but should be live).
#   * guardrails       — policy cache (without it EVERY check does a live Neon round-trip => 30/50ms SLO breached
#                        ~4-7x) and the per-tenant rate limiter / byte-quota (without it the SAFETY service
#                        FAILS OPEN to flooding). [found by load test]
#   * xagent           — token-revocation enforcement, agent-config cache, and idempotency/async task mode
#                        (without it revocation is skipped, idempotency 503s, async is 100% down). [found by e2e test]
# Point all three at the compose Valkey so these features actually work. Mirrors rag/memory/tool-* which already set it.
# =====================================================================================================================
services:
  llms-gateway:
    environment:
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379}
      # Keyless-local LLM: the Doppler dev_local env sets MOCK_PROVIDERS=false but the platform
      # provider keys (ANTHROPIC_API_KEY/OPENAI_API_KEY) are EMPTY and the gateway is in BYOK-only
      # mode (no env-key fallback) — so every chat/embedding 503s ("No LLM connection configured")
      # for any tenant without a registered BYOK connection, breaking the whole spine locally.
      # Force the deterministic mock provider (compose's own base default) so the platform is
      # testable offline. To exercise REAL providers instead, set this false AND register a BYOK
      # connection per tenant via POST /v1/keys with a valid key.
      MOCK_PROVIDERS: "true"
  guardrails-service:
    environment:
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379}
  xagent:
    environment:
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379}
      # Layer-B central authorize (Contract-4) is a deferred WP08 layer. In first-cycle the auth
      # default-allow policy is NOT seeded to permit the 'task:execute' action (auth.evaluate
      # requires the action to be one of the agent's scopes AND policy-permitted; executing agents
      # hold 'agent:execute', not 'task:execute'), so it denies legitimate tasks. The agent JWT
      # verify + the 'agent:execute' task-submit scope already gate execution at the endpoint.
      # The auth_client header/body bug is FIXED (it now calls /v1/authorize correctly), so flip this
      # back ON once a policy permitting the execute action is seeded. Off here to unblock the spine.
      AUTHORIZE_ENABLED: "false"
      # WP12 enhancement-stage activation. The RAG/Memory/Tool stages are coded + bound but default-OFF
      # in core/config.py (📋 Phases 5-7). Their downstream deps (rag/memory/tool-registry) are now built
      # and healthy, so enable them here. SAFE platform-wide: each stage SKIPS unless the agent's runtime
      # config opts in (allowed_kb_ids / memory_scope != 'none' / allowed_tools) — a spine-only agent with
      # none of those configured runs the byte-identical LOAD→PRE_GUARDRAIL→PROMPT_BUILD→LLM→POST_GUARDRAIL
      # →EVENT pipeline. Closes Contract-15 cases 11-14 once an opted-in agent is configured.
      STAGE_ENABLE_RAG_QUERY: "true"
      STAGE_ENABLE_MEMORY_RETRIEVE: "true"
      STAGE_ENABLE_MEMORY_WRITE: "true"
      STAGE_ENABLE_TOOL_LOOP: "true"
