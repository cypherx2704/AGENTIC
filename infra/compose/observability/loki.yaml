# =====================================================================================================================
# infra/compose/observability/loki.yaml — Grafana Loki (single-binary, filesystem backend, local dev).
# Receives logs via the OTLP push endpoint (/otlp) from the collector; Grafana queries it at :3100.
# Local-only: boltdb-shipper + filesystem on a docker volume. Auth disabled (single-tenant local).
# =====================================================================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h           # 7 days
  reject_old_samples: false
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
