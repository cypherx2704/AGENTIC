# Grafana dashboard provider — loads every *.json under /var/lib/grafana/dashboards (mounted from
# infra/compose/observability/grafana/dashboards) into the "CypherX" folder at startup.
apiVersion: 1

providers:
  - name: cypherx
    orgId: 1
    folder: CypherX
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
