# Test DopplerSecret (Phase 1 Component 11 / Component 20) — backs assertion 9.
# The Doppler operator syncs the `smoketest.echo` Doppler config into a K8s
# Secret named `echo-runtime` in the smoketest namespace; the echo-service
# Deployment envFroms it, so SMOKE_SECRET (and the DB/Valkey/Kafka passwords)
# land in the pod env. /echo then reports SMOKE_SECRET_LEN > 0, proving the
# operator sync worked end-to-end.
#
# This is the SAME object the cypherx-service base chart's dopplersecret.yaml
# renders from smoketest/values.yaml — it is duplicated here as a standalone,
# Helm-less manifest so the test secret reference is explicit and reviewable.
#
# `doppler-token-secret` is the per-(env,namespace) operator bootstrap Secret,
# provisioned by Terraform via the Doppler provider (Component 11). The script
# ensures it exists in the smoketest namespace before applying this.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: echo-runtime
  namespace: smoketest
  labels:
    app.kubernetes.io/part-of: cypherx
    cypherx.ai/service: echo
    cypherx.ai/purpose: infra-smoke-test
spec:
  tokenSecret:
    name: doppler-token-secret
  project: cypherx-platform
  config: smoketest.echo
  managedSecret:
    name: echo-runtime
    namespace: smoketest
    type: Opaque
