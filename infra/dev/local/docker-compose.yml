# =====================================================================================================================
# dev/local/docker-compose.yml — CypherX local development dependencies (Phase 1, Component 17c).
#
# Brings up the four backing services that SharedCore + xAgent depend on, as laptop-friendly substitutes for the
# AWS-managed cloud infrastructure:
#
#   postgres  → pgvector/pgvector:pg16   substitutes RDS PostgreSQL 16 (+ pgvector + pg_stat_statements)   :5432
#   valkey    → valkey/valkey:7-alpine   substitutes ElastiCache Valkey 7.x                                :6379
#   redpanda  → redpandadata/redpanda    substitutes MSK Kafka 3.6.x (Kafka API-compatible single binary)  :9092 / :9644
#   minio     → minio/minio              substitutes S3 (loki/tempo/rag buckets, S3-compatible API)         :9000 / :9001
#
# Istio and Kong are intentionally NOT included locally — services reach each other directly via DNS
# (http://auth-service:8080). The ALB->Kong plaintext boundary and the mesh mTLS live only in the cloud envs.
#
# Validate with:  docker compose -f dev/local/docker-compose.yml config
# Bring up with:  docker compose -f dev/local/docker-compose.yml up -d
#
# Sizing is deliberately the doc's "dev = small" laptop profile: single Postgres, single Valkey, single Redpanda
# broker, single MinIO node. Topics are created single-partition/replication-1 by seed/kafka-topics.sh.
#
# Secrets here are LOCAL-ONLY throwaway dev credentials — NOT real keys. Real creds come from Doppler in cloud envs.
# Override any of them via a sibling .env file (see seed/doppler.env.example) without editing this file.
# =====================================================================================================================

name: cypherx-local

services:
  # -------------------------------------------------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector — RDS substitute. The init SQL in seed/ creates the 7 schemas, *_user/*_ddl roles, the
  # vector + pg_stat_statements extensions, and an example RLS table so the Contract 13 tenant-isolation path is
  # exercisable locally. pg_stat_statements is preloaded to mirror the RDS parameter group (Component 5).
  # -------------------------------------------------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cypherx-postgres
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements" # mirror RDS param group (pgvector is a CREATE EXTENSION, NOT preloaded)
      - "-c"
      - "max_connections=200"                          # laptop-sized; cloud RDS is 1000
      - "-c"
      - "idle_in_transaction_session_timeout=60000"    # Component 5 — kill idle txns after 60s (prevents RLS context leak)
      - "-c"
      - "log_min_duration_statement=500"               # log slow queries >= 500ms
    environment:
      # LOCAL-ONLY throwaway superuser. Override via .env if you like; never a real secret.
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-cypherx_admin}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-localdev}
      POSTGRES_DB: cypherx_platform
      # Passed through to the init script so each per-service user gets a known local password.
      CYPHERX_LOCAL_DB_PASSWORD: ${CYPHERX_LOCAL_DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Files in /docker-entrypoint-initdb.d run alphabetically on FIRST init (empty data dir) only.
      - ./seed/postgres-init.sql:/docker-entrypoint-initdb.d/00-postgres-init.sql:ro
    healthcheck:
      # -U/-d must match a created role+db; the example table check ensures init actually completed.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-cypherx_admin} -d cypherx_platform"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------------------------------------------------------
  # Valkey 7 — ElastiCache substitute. Used by services for idempotency keys (Contract 9), JWKS cache, rate limits.
  # No AUTH token locally (cloud uses a Doppler-sourced AUTH token + TLS); keep it open on localhost for simplicity.
  # -------------------------------------------------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:7-alpine
    container_name: cypherx-valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  # -------------------------------------------------------------------------------------------------------------------
  # Redpanda — MSK Kafka substitute (Kafka API-compatible, single binary, fits on a laptop). Component 17c.
  #   9092 → Kafka API (advertised as localhost for host clients AND as redpanda:29092 for in-cluster/compose peers)
  #   9644 → Admin/Prometheus API (also used by the readiness healthcheck)
  #   8081 → Schema Registry (handy for Avro/Protobuf experiments; Confluent SR is the cloud equivalent)
  #   8082 → Pandaproxy (Kafka REST)
  # Topics are created by seed/kafka-topics.sh via `rpk` AFTER this is healthy.
  # -------------------------------------------------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: cypherx-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode dev-container          # single-node, no quorum requirements — laptop profile
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      # Dual listeners: INTERNAL for compose/kind peers (redpanda:29092), EXTERNAL for host clients (localhost:9092).
      - --kafka-addr INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
      - --pandaproxy-addr INTERNAL://0.0.0.0:28082,EXTERNAL://0.0.0.0:8082
      - --advertise-pandaproxy-addr INTERNAL://redpanda:28082,EXTERNAL://localhost:8082
      # Schema Registry is a single HTTP listener — one address only. A dual
      # INTERNAL/EXTERNAL pair on the SAME 0.0.0.0:8081 double-binds the port
      # ("posix_listen failed ... Address already in use") and crash-loops redpanda.
      - --schema-registry-addr 0.0.0.0:8081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "9092:9092"   # Kafka API (host)
      - "9644:9644"   # Admin / Prometheus
      - "8081:8081"   # Schema Registry
      - "8082:8082"   # Pandaproxy (Kafka REST)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      # rpk cluster health returns non-zero until the broker is fully up and the controller is elected.
      test: ["CMD-SHELL", "rpk cluster health -X brokers=localhost:9092 | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # -------------------------------------------------------------------------------------------------------------------
  # MinIO — S3 substitute. Provides the buckets that Loki (logs), Tempo (traces) and RAG (documents) use in cloud.
  #   9000 → S3 API   9001 → web console
  # The minio-init one-shot below creates the dev buckets so services find them on first boot.
  # -------------------------------------------------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: cypherx-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      # LOCAL-ONLY throwaway credentials. Cloud uses IRSA / Doppler-sourced keys.
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-cypherxlocal}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-cypherxlocal}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------------------------------------------------------------------
  # minio-init — one-shot bucket bootstrap. Creates the dev buckets then exits 0. Not a long-running service.
  # Mirrors the cloud bucket set: cypherx-loki-logs-<env>, cypherx-tempo-traces-<env>, plus a RAG document bucket.
  # -------------------------------------------------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: cypherx-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "${S3_ACCESS_KEY:-cypherxlocal}" "${S3_SECRET_KEY:-cypherxlocal}"
        mc mb --ignore-existing local/cypherx-loki-logs-dev
        mc mb --ignore-existing local/cypherx-tempo-traces-dev
        mc mb --ignore-existing local/cypherx-rag-documents-dev
        echo "minio buckets ready"
    restart: "no"

# ---------------------------------------------------------------------------------------------------------------------
# Named volumes — survive `docker compose down`; wiped only by `docker compose down -v` (see README "reset").
# ---------------------------------------------------------------------------------------------------------------------
volumes:
  postgres-data:
  valkey-data:
  redpanda-data:
  minio-data:
